<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local AI</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <button id="newChatBtn" class="new-chat-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    Nuevo chat
                </button>
            </div>
            
            <div class="conversations-list" id="conversationsList">
                <!-- Las conversaciones se cargarán aquí -->
            </div>
            
            <div class="sidebar-footer">
                <div class="model-selector">
                    <label for="modelSelect" style="font-size: 12px; color: #666; display: block; margin-bottom: 8px;">
                        🤖 Modelo IA
                    </label>
                    <select id="modelSelect" class="model-select">
                        <option value="">Cargando modelos...</option>
                    </select>
                </div>
                
                <div class="model-info">
                    <span class="model-badge" id="currentModelBadge">
                        🧠 Cargando...
                    </span>
                </div>
                
                <button id="clearAllBtn" class="clear-all-btn">
                    🗑️ Limpiar historial
                </button>
            </div>
        </aside>
        
        <!-- Main Chat Area -->
        <main class="chat-area">
            <div class="chat-header">
                <h1 id="chatTitle">DeepSeek</h1>
                <div class="status-indicator">
                    <span class="status-dot"></span>
                    <span id="statusText">Conectando...</span>
                </div>
            </div>
            
            <div class="messages-container" id="messagesContainer">
                <div class="welcome-message">
                    <div class="welcome-icon">✨</div>
                    <h2>¿En qué puedo ayudarte?</h2>
                    <p>Tu asistente de IA completamente local y privado</p>
                    <p style="font-size: 14px; margin-top: 16px;">
                        💡 Powered by Ollama & DeepSeek
                    </p>
                </div>
            </div>
            
            <div class="input-container">
                <div class="input-wrapper">
                    <textarea 
                        id="messageInput" 
                        placeholder="Escribe tu mensaje..."
                        rows="1"
                    ></textarea>
                    <div class="input-actions">
                        <!-- Clip para adjuntar PDF -->
                        <label for="pdfUpload" class="attach-btn" id="attachBtn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                            </svg>
                        </label>
                        <input type="file" id="pdfUpload" accept=".pdf" style="display: none;">
                        <button id="sendBtn" class="send-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div id="pdfStatus" class="pdf-status"></div>
                <div class="input-hint">
                    Presiona Enter para enviar · Shift+Enter para nueva línea
                </div>
            </div>
        </main>
    </div>
    
    <script src="/static/js/chat.js"></script>
</body>
</html>
